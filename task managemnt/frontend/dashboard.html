<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Task Manager Dashboard - Add, manage, and track your tasks">
    <title>Task Manager — Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Navigation Bar -->
        <nav class="navbar" id="navbar">
            <div class="navbar-brand">
                <span>✦</span> TaskManager
            </div>
            <div class="navbar-user">
                <span class="user-email" id="userEmail">👤 user@email.com</span>
                <button class="btn-logout" id="logoutBtn" onclick="logout()">Logout</button>
            </div>
        </nav>

        <!-- Stats Row -->
        <div class="stats-row" id="statsRow">
            <div class="stat-card">
                <div class="stat-number" id="totalCount">0</div>
                <div class="stat-label">Total Tasks</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="completedCount">0</div>
                <div class="stat-label">Completed</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="pendingCount">0</div>
                <div class="stat-label">Pending</div>
            </div>
        </div>

        <!-- Add Task Section -->
        <div class="add-task-card">
            <h2>➕ New Task</h2>
            <form class="add-task-form" id="addTaskForm">
                <div class="form-group" style="flex:2">
                    <label for="taskTitle">Task Title</label>
                    <input type="text" id="taskTitle" placeholder="What needs to be done?" required>
                </div>
                <div class="form-group" style="flex:1">
                    <label for="taskDueDate">Due Date</label>
                    <input type="date" id="taskDueDate">
                </div>
                <button type="submit" class="btn-add" id="addTaskBtn">
                    ➕ Add
                </button>
            </form>
        </div>

        <!-- Alert for task operations -->
        <div id="dashAlert" class="alert" style="margin-bottom:20px"></div>

        <!-- Filter Tabs -->
        <div class="filter-bar" id="filterBar">
            <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">All</button>
            <button class="filter-btn" data-filter="pending" onclick="setFilter('pending')">Pending</button>
            <button class="filter-btn" data-filter="completed" onclick="setFilter('completed')">Completed</button>
        </div>

        <!-- Task List -->
        <div class="task-list" id="taskList">
            <!-- Tasks are rendered here dynamically by JavaScript -->
        </div>
    </div>
    <script src="js/dashboard.js"></script>
    <script src="js/chatbot.js"></script>
</body>
</html>
